<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cart - ShopEasy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    nav { background: #2c3e50; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    nav h1 { font-size: 24px; }
    nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 16px; }
    nav a:hover { text-decoration: underline; }
    .container { max-width: 700px; margin: 30px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { color: #2c3e50; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #2c3e50; color: white; }
    .total { text-align: right; font-size: 20px; font-weight: bold; margin-top: 20px; color: #e74c3c; }
    button { padding: 10px 25px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 15px; margin-top: 20px; }
    button:hover { background: #e74c3c; }
    .remove { background: #e74c3c; padding: 5px 10px; font-size: 13px; margin: 0; }
    .empty { text-align: center; color: #888; font-size: 18px; margin-top: 30px; }
  </style>
</head>
<body>
<nav>
  <h1>🛒 ShopEasy</h1>
  <div>
    <a href="index.html">Home</a>
    <a href="cart.html">🛒 Cart (<span id="cart-count">0</span>)</a>
    <a href="orders.html">📦 My Orders</a>
  </div>
</nav>
<div class="container">
  <h2>Your Cart</h2>
  <div id="cart-content"></div>
  <div class="total" id="total"></div>
  <div id="checkout-btn"></div>
</div>
<script>
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  document.getElementById('cart-count').textContent = cart.reduce((a, b) => a + b.qty, 0);
  function renderCart() {
    const container = document.getElementById('cart-content');
    if (cart.length === 0) {
      container.innerHTML = '<p class="empty">Cart is empty! <a href="index.html">Shop Now</a></p>';
      document.getElementById('total').textContent = '';
      document.getElementById('checkout-btn').innerHTML = '';
      return;
    }
    let rows = cart.map(i => `
      <tr>
        <td>${i.name}</td>
        <td>${i.qty}</td>
        <td>₹${i.price * i.qty}</td>
        <td><button class="remove" onclick="remove(${i.id})">Remove</button></td>
      </tr>`).join('');
    container.innerHTML = `<table><tr><th>Product</th><th>Qty</th><th>Price</th><th></th></tr>${rows}</table>`;
    const total = cart.reduce((a, b) => a + b.price * b.qty, 0);
    document.getElementById('total').textContent = 'Total: ₹' + total;
    document.getElementById('checkout-btn').innerHTML = '<button onclick="checkout()">Proceed to Checkout</button>';
  }
  function remove(id) {
    cart = cart.filter(i => i.id !== id);
    localStorage.setItem('cart', JSON.stringify(cart));
    document.getElementById('cart-count').textContent = cart.reduce((a, b) => a + b.qty, 0);
    renderCart();
  }
  function checkout() {
    const name = prompt('Enter your name:');
    const address = prompt('Enter your address:');
    if (!name || !address) return alert('Name and address required!');
    const total = cart.reduce((a, b) => a + b.price * b.qty, 0);
    fetch('http://localhost:5000/api/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: cart, total, name, address })
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        alert('Order placed! Order ID: ' + data.orderId);
        localStorage.removeItem('cart');
        cart = [];
        renderCart();
      }
    });
  }
  renderCart();
</script>
</body>
</html>
