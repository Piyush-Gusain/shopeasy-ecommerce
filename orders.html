 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Orders - ShopEasy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    nav { background: #2c3e50; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    nav h1 { font-size: 24px; }
    nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 16px; }
    nav a:hover { text-decoration: underline; }
    .container { max-width: 700px; margin: 30px auto; }
    .order-card { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .order-card h3 { color: #2c3e50; margin-bottom: 10px; }
    .order-card p { margin: 5px 0; color: #555; }
    .status { display: inline-block; padding: 4px 12px; background: #2ecc71; color: white; border-radius: 20px; font-size: 13px; }
    .empty { text-align: center; color: #888; font-size: 18px; margin-top: 50px; }
    h2 { text-align: center; padding: 20px; color: #2c3e50; }
  </style>
</head>
<body>
<nav>
  <h1>🛒 ShopEasy</h1>
  <div>
    <a href="index.html">Home</a>
    <a href="cart.html">🛒 Cart (<span id="cart-count">0</span>)</a>
    <a href="orders.html">📦 My Orders</a>
  </div>
</nav>
<h2>My Orders</h2>
<div class="container" id="orders"></div>
<script>
  const cart = JSON.parse(localStorage.getItem('cart')) || [];
  document.getElementById('cart-count').textContent = cart.reduce((a, b) => a + b.qty, 0);
  fetch('http://localhost:5000/api/orders')
    .then(res => res.json())
    .then(orders => {
      const container = document.getElementById('orders');
      if (orders.length === 0) {
        container.innerHTML = '<p class="empty">No orders yet! <a href="index.html">Shop Now</a></p>';
        return;
      }
      orders.reverse().forEach(o => {
        const items = o.items.map(i => `${i.name} x${i.qty}`).join(', ');
        container.innerHTML += `
          <div class="order-card">
            <h3>Order #${o.id}</h3>
            <p><b>Name:</b> ${o.name}</p>
            <p><b>Address:</b> ${o.address}</p>
            <p><b>Items:</b> ${items}</p>
            <p><b>Total:</b> ₹${o.total}</p>
            <p><b>Date:</b> ${o.date}</p>
            <p><b>Status:</b> <span class="status">${o.status}</span></p>
          </div>`;
      });
    });
</script>
</body>
</html>
