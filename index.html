<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ShopEasy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    nav { background: #2c3e50; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    nav h1 { font-size: 24px; }
    nav a { color: white; text-decoration: none; margin-left: 20px; font-size: 16px; }
    nav a:hover { text-decoration: underline; }
    .products { display: flex; flex-wrap: wrap; gap: 20px; padding: 30px; justify-content: center; }
    .card { background: white; border-radius: 8px; padding: 20px; width: 220px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
    .card h3 { margin: 10px 0 5px; }
    .card p { color: #e74c3c; font-weight: bold; font-size: 18px; }
    .card button { margin-top: 10px; padding: 8px 20px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 15px; }
    .card button:hover { background: #e74c3c; }
    h2 { text-align: center; padding: 20px; color: #2c3e50; }
  </style>
</head>
<body>
<nav>
  <h1>🛒 ShopEasy</h1>
  <div>
    <a href="index.html">Home</a>
    <a href="cart.html">🛒 Cart (<span id="cart-count">0</span>)</a>
    <a href="orders.html">📦 My Orders</a>
  </div>
</nav>
<h2>Our Products</h2>
<div class="products" id="products"></div>
<script>
  const cart = JSON.parse(localStorage.getItem('cart')) || [];
  document.getElementById('cart-count').textContent = cart.reduce((a, b) => a + b.qty, 0);
  fetch('http://localhost:5000/api/products')
    .then(res => res.json())
    .then(products => {
      const container = document.getElementById('products');
      products.forEach(p => {
        container.innerHTML += `
          <div class="card">
            <img src="${p.image}" alt="${p.name}" />
            <h3>${p.name}</h3>
            <p>₹${p.price}</p>
            <button onclick="addToCart(${p.id}, '${p.name}', ${p.price})">Add to Cart</button>
          </div>`;
      });
    });
  function addToCart(id, name, price) {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const existing = cart.find(i => i.id === id);
    if (existing) existing.qty++;
    else cart.push({ id, name, price, qty: 1 });
    localStorage.setItem('cart', JSON.stringify(cart));
    document.getElementById('cart-count').textContent = cart.reduce((a, b) => a + b.qty, 0);
    alert(name + ' added to cart!');
  }
</script>
</body>
</html>
